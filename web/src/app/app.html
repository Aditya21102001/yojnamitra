<a class="skip-link" href="#main-content">{{ i18n.t('a11y.skip') }}</a>

<nav class="navbar" [attr.aria-label]="i18n.t('nav.primary')">
  <a class="navbar__brand" routerLink="/"><span aria-hidden="true">🏛️</span> YojanaMitra</a>
  <div class="navbar__links">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">{{ i18n.t('nav.find') }}</a>
    @if (auth.isLoggedIn()) {
      <a routerLink="/dashboard" routerLinkActive="active">{{ i18n.t('nav.dashboard') }}</a>
      <span class="navbar__user">{{ i18n.t('nav.hi') }}, {{ auth.username() }}</span>
      <button class="navbar__logout" type="button" (click)="logout()">{{ i18n.t('nav.logout') }}</button>
    } @else {
      <a routerLink="/login" routerLinkActive="active">{{ i18n.t('nav.login') }}</a>
      <a routerLink="/register" routerLinkActive="active" class="navbar__cta">{{ i18n.t('nav.signup') }}</a>
    }
    <button class="navbar__lang" type="button" (click)="i18n.toggle()"
      [attr.aria-label]="i18n.lang() === 'en' ? i18n.t('a11y.langToHi') : i18n.t('a11y.langToEn')">
      @if (i18n.lang() === 'en') {
        <span lang="hi">हिंदी</span>
      } @else {
        <span lang="en">EN</span>
      }
    </button>
  </div>
</nav>

<router-outlet />

<!-- The live region must already be in the DOM for assistive tech to announce
     text that appears inside it later, so the wrapper renders unconditionally. -->
<div role="status" aria-live="polite" aria-atomic="true">
  @if (toast.message(); as m) {
    <div class="toast">{{ m }}</div>
  }
</div>
