<main class="auth-wrap" id="main-content" tabindex="-1">
  <div class="card auth-card">
    <h1>{{ i18n.t('forgot.title') }}</h1>

    @if (submitted()) {
      <div class="status" role="status">{{ i18n.t('forgot.sent') }}</div>
      <p class="auth-alt">
        <a routerLink="/login">{{ i18n.t('forgot.backToLogin') }}</a>
      </p>
    } @else {
      <p class="muted">{{ i18n.t('forgot.subtitle') }}</p>

      <form (ngSubmit)="submit()" #f="ngForm">
        <label class="full">
          <span>{{ i18n.t('forgot.identifier') }}</span>
          <input name="usernameOrEmail" [(ngModel)]="usernameOrEmail" #id="ngModel" required
            autocomplete="username" autofocus
            [attr.aria-invalid]="id.touched && id.invalid ? 'true' : null" />
        </label>

        <button class="btn btn--block" [disabled]="loading() || f.invalid">
          @if (loading()) { {{ i18n.t('forgot.sending') }} } @else { {{ i18n.t('forgot.submit') }} }
        </button>
      </form>

      <p class="auth-alt">
        <a routerLink="/login">{{ i18n.t('forgot.backToLogin') }}</a>
      </p>
    }
  </div>
</main>
