server:
  port: 8080

spring:
  application:
    name: yojanamitra-api
  # DB_ENGINE selects the datasource profile: "h2" (default) or "postgres".
  profiles:
    active: ${DB_ENGINE:h2}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate.format_sql: true

# Application config
yojanamitra:
  ai:
    base-url: http://localhost:8000
  jwt:
    # Dev secret — override with the YOJANAMITRA_JWT_SECRET env var in production.
    secret: ${YOJANAMITRA_JWT_SECRET:change-me-dev-secret-please-use-a-long-random-value-32b+}
    expiration-ms: 86400000   # 24 hours
    # How long the user has to enter a code after the password step succeeds.
    mfa-challenge-ms: 300000  # 5 minutes
  mfa:
    # Shown as the account issuer in Google Authenticator / Authy.
    issuer: YojanaMitra
    # Encrypts TOTP secrets at rest. Override with YOJANAMITRA_MFA_ENC_KEY in
    # production; rotating it makes every existing enrolment undecryptable.
    encryption-key: ${YOJANAMITRA_MFA_ENC_KEY:change-me-dev-only-mfa-encryption-key}
  web:
    # Used to build the password-reset link that goes into the email.
    base-url: ${YOJANAMITRA_WEB_BASE_URL:http://localhost:4200}
  reset:
    ttl-minutes: 15
  mail:
    # "log" writes emails to the application log — free, offline, and the right
    # default for dev. Set "brevo" (+ BREVO_API_KEY) to actually deliver them.
    provider: ${YOJANAMITRA_MAIL_PROVIDER:log}
    from-email: ${YOJANAMITRA_MAIL_FROM:no-reply@yojanamitra.example}
    from-name: YojanaMitra
    brevo:
      api-key: ${BREVO_API_KEY:}

logging:
  level:
    com.yojanamitra: INFO
