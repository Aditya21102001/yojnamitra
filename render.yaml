# Render blueprint for YojanaMitra (Groq LLM + Jina embeddings + Neon/Render Postgres).
# See DEPLOY.md for the step-by-step. Values marked `sync: false` are set in the
# Render dashboard (secrets / cross-service URLs known only after first deploy).
services:
  # ---- GenAI service (Python/FastAPI) — Groq + Jina, no local model ----
  - type: web
    name: yojanamitra-ai
    runtime: docker
    dockerfilePath: ./ai/Dockerfile
    dockerContext: ./ai
    plan: free
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: EMBED_PROVIDER
        value: jina
      - key: GROQ_API_KEY
        sync: false            # from console.groq.com (free)
      - key: JINA_API_KEY
        sync: false            # from jina.ai (free)

  # ---- Spring Boot API / gateway ----
  - type: web
    name: yojanamitra-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    plan: free
    envVars:
      # ApiApplication.applyDatabaseUrl() parses this before Spring starts and
      # switches the app onto the postgres profile. If it is unset the app
      # silently falls back to IN-MEMORY H2 and every user — with their MFA
      # enrolment, password and reset tokens — is wiped on each restart.
      # Verify on boot: "[YojanaMitra] DATABASE_URL detected -> jdbc:postgresql://…"
      #
      # Render's free Postgres is DELETED AFTER 30 DAYS. For something durable,
      # delete the `databases:` block below, change this entry to `sync: false`,
      # and paste a Neon connection string into the dashboard (free tier is
      # permanent). Do not simply remove the entry — unset means H2.
      - key: DATABASE_URL
        fromDatabase: { name: yojanamitra-db, property: connectionString }

      - key: YOJANAMITRA_JWT_SECRET
        generateValue: true
      # Encrypts TOTP secrets at rest. Rotating it invalidates every enrolment.
      - key: YOJANAMITRA_MFA_ENC_KEY
        generateValue: true

      - key: YOJANAMITRA_AI_BASE_URL
        sync: false            # the yojanamitra-ai service URL (after it deploys)
      - key: YOJANAMITRA_CORS_ALLOWED_ORIGINS
        sync: false            # the yojanamitra-web URL (after it deploys)

      # ---- password reset ----
      # The origin baked into reset links. Unset, it defaults to
      # http://localhost:4200 and every emailed link is broken.
      - key: YOJANAMITRA_WEB_BASE_URL
        sync: false            # the yojanamitra-web URL, e.g. https://yojanamitra-web.onrender.com
      # Leave unset and the provider defaults to "log": no email is sent and the
      # reset token is printed into this service's logs instead. That is fine for
      # a demo, useless for real users, and means anyone who can read the logs can
      # seize an account. Set to "brevo" ONLY together with BREVO_API_KEY —
      # BrevoEmailSender fails fast at startup if the key is missing.
      - key: YOJANAMITRA_MAIL_PROVIDER
        sync: false            # "brevo" for real delivery; omit for log-only
      - key: BREVO_API_KEY
        sync: false            # brevo.com → SMTP & API → API keys (free: 300 mails/day)
      - key: YOJANAMITRA_MAIL_FROM
        sync: false            # a sender address you have verified in Brevo

  # ---- Angular web (static) ----
  # Set apiBase in web/src/environments/environment.prod.ts to the API URL first.
  - type: web
    name: yojanamitra-web
    runtime: static
    buildCommand: cd web && npm ci && npx ng build
    staticPublishPath: ./web/dist/web/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: yojanamitra-db
    plan: free
